      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: method
          - type: CheckBox
            name: pValue
  - type: CollapseBox
    label: Wykres
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: showPlot
