title: Zmienne jakosciowe
name: qualitative
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    permitted:
      - factor
    children:
      - type: TargetLayoutBox
        label: Zmienne
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
      - type: TargetLayoutBox
        label: Zmienna grupujaca
        children:
          - type: VariablesListBox
            name: splitBy
            maxItemCount: 1
            isTarget: true
            height: small
  - type: CollapseBox
    label: Opcje
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label: Procenty
            children:
              - type: CheckBox
                name: pcCol
              - type: CheckBox
                name: pcRow
              - type: CheckBox
                name: pcTotal
  - type: CollapseBox
    label: Wykresy
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: Label
            label: Zmienne jakosciowe
            children:
              - type: CheckBox
                name: bar
              - type: CheckBox
                name: mosaic
